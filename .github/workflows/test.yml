name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r server/requirements.txt pytest
      - name: Run tests
        shell: bash
        run: python -m pytest tests/ -q 2>&1 | tee pytest.log
      - name: Surface failures as annotations
        if: failure()
        shell: bash
        run: grep -aE "FAILED|ERROR|Error|assert" pytest.log | head -20 | while read -r line; do echo "::error::${line}"; done
